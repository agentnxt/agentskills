# Conduit (conduwuit) — Matrix Homeserver
# Upstream: https://github.com/girlbossceo/conduwuit
# Lightweight Matrix server with embedded RocksDB — no external database needed.

services:
  conduit:
    image: girlbossceo/conduwuit:latest
    container_name: openatonomyx-conduit
    restart: unless-stopped
    environment:
      CONDUWUIT_SERVER_NAME: ${CONDUIT_SERVER_NAME:-matrix.agnxxt.com}
      CONDUWUIT_DATABASE_PATH: /var/lib/conduwuit
      CONDUWUIT_PORT: "6167"
      CONDUWUIT_ADDRESS: "0.0.0.0"
      CONDUWUIT_ALLOW_REGISTRATION: ${CONDUIT_ALLOW_REGISTRATION:-true}
      CONDUWUIT_REGISTRATION_TOKEN: ${CONDUIT_REGISTRATION_TOKEN}
      CONDUWUIT_ALLOW_FEDERATION: ${CONDUIT_ALLOW_FEDERATION:-true}
      CONDUWUIT_TRUSTED_SERVERS: '["matrix.org"]'
      CONDUWUIT_MAX_REQUEST_SIZE: "20000000"
      CONDUWUIT_WELL_KNOWN_CLIENT: "https://${CONDUIT_SERVER_NAME:-matrix.agnxxt.com}"
      CONDUWUIT_WELL_KNOWN_SERVER: "${CONDUIT_SERVER_NAME:-matrix.agnxxt.com}:443"
    expose:
      - "6167"
    volumes:
      - conduit-data:/var/lib/conduwuit
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://127.0.0.1:6167/_matrix/client/versions || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks: [default]

volumes:
  conduit-data:

networks:
  default:
    name: openatonomyx
    external: true
