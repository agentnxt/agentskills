# /etc/nginx/sites-available/identity-fabric-mcp
# SSE transport for MCP — proxies mcp.identity.openautonomyx.com → localhost:8090

server {
    listen 80;
    server_name mcp.identity.openautonomyx.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mcp.identity.openautonomyx.com;

    ssl_certificate     /etc/letsencrypt/live/mcp.identity.openautonomyx.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.identity.openautonomyx.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # SSE requires long-lived connections — disable buffering, extend timeouts
    location / {
        proxy_pass          http://127.0.0.1:8090;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        '';

        # SSE-specific: no buffering, long timeout
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        chunked_transfer_encoding on;

        # CORS — allow Claude Desktop and Claude Code
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
