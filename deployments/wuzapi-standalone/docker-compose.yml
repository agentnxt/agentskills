# WuzAPI — Standalone deployment for www.openautonomyx.com
# WhatsApp Multi-Device API with Caddy reverse proxy (auto-HTTPS)
#
# Usage:
#   cp .env.example .env   # fill in secrets
#   ./deploy.sh            # or: docker compose up -d
#
# Endpoint: https://www.openautonomyx.com

name: wuzapi-openautonomyx

services:
  # ─── Reverse Proxy (HTTPS) ─────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: wuzapi-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - wuzapi
    networks: [wuzapi-net]

  # ─── WuzAPI ────────────────────────────────────────────────────
  wuzapi:
    image: asternic/wuzapi
    container_name: wuzapi-server
    restart: unless-stopped
    environment:
      WUZAPI_ADMIN_TOKEN: ${WUZAPI_ADMIN_TOKEN}
      WUZAPI_GLOBAL_ENCRYPTION_KEY: ${WUZAPI_GLOBAL_ENCRYPTION_KEY}
      WUZAPI_GLOBAL_HMAC_KEY: ${WUZAPI_GLOBAL_HMAC_KEY:-}
      WUZAPI_GLOBAL_WEBHOOK: ${WUZAPI_GLOBAL_WEBHOOK:-}
      WUZAPI_PORT: "8080"
      WUZAPI_ADDRESS: "0.0.0.0"
      DB_USER: ${WUZAPI_DB_USER:-wuzapi}
      DB_PASSWORD: ${WUZAPI_DB_PASSWORD:-wuzapi}
      DB_NAME: ${WUZAPI_DB_NAME:-wuzapi}
      DB_HOST: wuzapi-db
      DB_PORT: "5432"
      TZ: ${TZ:-UTC}
      WEBHOOK_FORMAT: json
      SESSION_DEVICE_NAME: ${SESSION_DEVICE_NAME:-OpenAutonomyX}
    expose:
      - "8080"
    depends_on:
      wuzapi-db:
        condition: service_healthy
    networks: [wuzapi-net]

  # ─── PostgreSQL ────────────────────────────────────────────────
  wuzapi-db:
    image: postgres:16-alpine
    container_name: wuzapi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${WUZAPI_DB_USER:-wuzapi}
      POSTGRES_PASSWORD: ${WUZAPI_DB_PASSWORD:-wuzapi}
      POSTGRES_DB: ${WUZAPI_DB_NAME:-wuzapi}
    volumes:
      - wuzapi-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WUZAPI_DB_USER:-wuzapi}"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [wuzapi-net]

networks:
  wuzapi-net:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  wuzapi-db-data:
