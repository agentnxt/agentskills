# WuzAPI — WhatsApp Multi-Device API
# Upstream: https://github.com/asternic/wuzapi (MIT)

services:
  wuzapi:
    image: asternic/wuzapi
    container_name: openatonomyx-wuzapi
    restart: unless-stopped
    environment:
      WUZAPI_ADMIN_TOKEN: ${WUZAPI_ADMIN_TOKEN}
      WUZAPI_GLOBAL_ENCRYPTION_KEY: ${WUZAPI_GLOBAL_ENCRYPTION_KEY}
      WUZAPI_GLOBAL_HMAC_KEY: ${WUZAPI_GLOBAL_HMAC_KEY:-}
      WUZAPI_GLOBAL_WEBHOOK: ${WUZAPI_GLOBAL_WEBHOOK:-}
      WUZAPI_PORT: "8080"
      WUZAPI_ADDRESS: "0.0.0.0"
      DB_USER: ${WUZAPI_DB_USER:-wuzapi}
      DB_PASSWORD: ${WUZAPI_DB_PASSWORD:-wuzapi}
      DB_NAME: ${WUZAPI_DB_NAME:-wuzapi}
      DB_HOST: wuzapi-db
      DB_PORT: "5432"
      TZ: ${TZ:-UTC}
      WEBHOOK_FORMAT: json
      SESSION_DEVICE_NAME: ${SESSION_DEVICE_NAME:-WuzAPI}
    expose:
      - "8080"
    depends_on:
      wuzapi-db:
        condition: service_healthy
    networks: [default]

  wuzapi-db:
    image: postgres:16-alpine
    container_name: openatonomyx-wuzapi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${WUZAPI_DB_USER:-wuzapi}
      POSTGRES_PASSWORD: ${WUZAPI_DB_PASSWORD:-wuzapi}
      POSTGRES_DB: ${WUZAPI_DB_NAME:-wuzapi}
    volumes:
      - wuzapi-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WUZAPI_DB_USER:-wuzapi}"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [default]

volumes:
  wuzapi-db-data:

networks:
  default:
    name: openatonomyx
    external: true
